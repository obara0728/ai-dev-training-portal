<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>事業部PL・外注管理プロトタイプ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f8;
      --panel: #fff;
      --ink: #18212b;
      --muted: #687586;
      --line: #dce3ea;
      --soft: #eef4f6;
      --brand: #126b72;
      --brand-dark: #0d5157;
      --accent: #b85f2d;
      --ok: #167044;
      --warn: #9a5b00;
      --bad: #b42318;
      --shadow: 0 10px 24px rgba(24, 33, 43, .07);
      font-family: "Segoe UI", "Meiryo", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
    }
    button:hover { border-color: #9cabba; }
    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 700;
    }
    button.primary:hover { background: var(--brand-dark); }
    button.ghost { background: transparent; }

    input, select, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
    }
    textarea { min-height: 72px; resize: vertical; }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      min-width: 150px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255, 255, 255, .95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .topbar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 14px 22px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
    }
    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tabs {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 22px 12px;
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 8px;
    }
    .tab {
      text-align: left;
      padding: 10px 12px;
      background: #fff;
    }
    .tab strong {
      display: block;
      font-size: 14px;
    }
    .tab span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }
    .tab.active {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .tab.active span { color: #d8eef0; }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 22px 30px;
    }
    .view { display: none; }
    .view.active { display: block; }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 14px;
    }
    h2 {
      margin: 0;
      font-size: 21px;
    }
    .lead {
      margin: 5px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .card {
      padding: 13px;
      min-height: 86px;
    }
    .card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .card strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
    }

    .panel {
      padding: 14px;
      margin-bottom: 14px;
    }
    .panel-title {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .form-grid, .filters {
      display: grid;
      grid-template-columns: repeat(6, minmax(130px, 1fr));
      gap: 10px;
      align-items: end;
    }
    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-6 { grid-column: 1 / -1; }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
    }
    th {
      background: #eef3f5;
      color: #344150;
      font-size: 12px;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .money { text-align: right; }
    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .ok { color: var(--ok); background: #eef8f2; border-color: #a8d7ba; }
    .warn { color: var(--warn); background: #fff7e8; border-color: #e5c27d; }
    .bad { color: var(--bad); background: #fff1f0; border-color: #e8aaa4; }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .pill {
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--soft);
      color: #31414d;
      font-size: 12px;
    }

    @media (max-width: 1080px) {
      .tabs, .cards { grid-template-columns: repeat(2, 1fr); }
      .form-grid, .filters { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .span-2, .span-3, .span-6 { grid-column: 1 / -1; }
    }
    @media (max-width: 680px) {
      .topbar, .page-head { align-items: stretch; flex-direction: column; }
      .tabs, .cards, .form-grid, .filters { grid-template-columns: 1fr; }
      .header-actions button { flex: 1 1 auto; }
      main, .topbar, .tabs { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>事業部PL・外注管理</h1>
        <p class="subtitle">制作入力、管理集計、請求転記元をひとつにまとめた確認用プロトタイプ</p>
      </div>
      <div class="header-actions">
        <button id="seedBtn">サンプル投入</button>
        <button id="jsonBtn">バックアップ</button>
        <button id="csvBtn">CSV出力</button>
        <button id="resetBtn" class="ghost">初期化</button>
      </div>
    </div>
    <nav class="tabs" aria-label="画面切替">
      <button class="tab active" type="button" data-view="production"><strong>制作チーム</strong><span>外注を入れる・未処理を見る</span></button>
      <button class="tab" type="button" data-view="manager"><strong>管理者</strong><span>外注費と粗利を見る</span></button>
      <button class="tab" type="button" data-view="billing"><strong>請求担当</strong><span>請求書の転記元を見る</span></button>
      <button class="tab" type="button" data-view="setup"><strong>初期設定</strong><span>案件・取引先を登録する</span></button>
    </nav>
  </header>

  <main>
    <section id="production" class="view active">
      <div class="page-head">
        <div>
          <h2>制作チームの外注入力</h2>
          <p class="lead">日々使う項目だけに絞っています。登録すると外注集計と請求転記元に反映されます。</p>
        </div>
      </div>
      <div class="cards" id="productionCards"></div>
      <div class="panel">
        <h3 class="panel-title">外注を登録</h3>
        <form id="outsourcingForm" class="form-grid">
          <label>計上月<input type="month" name="period" required></label>
          <label>クライアント<select name="clientId" required></select></label>
          <label>案件<select name="projectId" required></select></label>
          <label>担当者<select name="ownerId" required></select></label>
          <label>外注先<select name="vendorId" required></select></label>
          <label>請求対象<select name="billable"><option>請求対象</option><option>請求対象外</option></select></label>
          <label class="span-2">依頼内容<input name="description" placeholder="例: LPデザイン、記事制作" required></label>
          <label>数量<input type="number" name="quantity" min="0" step="0.1" value="1" required></label>
          <label>単価<input type="number" name="unitPrice" min="0" step="1" required></label>
          <label>請求書<select name="vendorInvoiceStatus"><option>未受領</option><option>受領済</option></select></label>
          <label>支払<select name="paymentStatus"><option>未払</option><option>支払予定</option><option>支払済</option></select></label>
          <button class="primary" type="submit">外注を追加</button>
        </form>
      </div>
      <div class="panel">
        <h3 class="panel-title">確認が必要なもの</h3>
        <div class="filters">
          <label>月<input type="month" id="productionMonth"></label>
          <label>担当者<select id="productionOwner"></select></label>
          <label>表示<select id="productionFocus"><option value="needs">未処理だけ</option><option value="all">すべて</option><option value="billable">請求対象だけ</option></select></label>
        </div>
      </div>
      <div class="table-wrap"><table id="productionTable"></table></div>
    </section>

    <section id="manager" class="view">
      <div class="page-head">
        <div>
          <h2>管理者ダッシュボード</h2>
          <p class="lead">売上、外注費、粗利を月別・案件別に確認します。</p>
        </div>
        <button class="primary" type="button" data-view-jump="setup">案件を追加</button>
      </div>
      <div class="cards" id="managerCards"></div>
      <div class="panel">
        <h3 class="panel-title">売上を登録</h3>
        <form id="revenueForm" class="form-grid">
          <label>計上月<input type="month" name="period" required></label>
          <label>クライアント<select name="clientId" required></select></label>
          <label>案件<select name="projectId" required></select></label>
          <label>担当者<select name="ownerId" required></select></label>
          <label>売上区分<select name="type"><option>月額</option><option>スポット</option><option>成果報酬</option><option>追加請求</option></select></label>
          <label>請求状況<select name="invoiceStatus"><option>未請求</option><option>請求書作成済</option><option>請求済</option><option>入金済</option></select></label>
          <label class="span-2">請求項目名<input name="itemName" placeholder="例: LP制作費" required></label>
          <label>売上金額<input type="number" name="amount" min="0" required></label>
          <button class="primary" type="submit">売上を追加</button>
        </form>
      </div>
      <div class="panel">
        <h3 class="panel-title">月別PL</h3>
        <div class="table-wrap"><table id="monthlyPlTable"></table></div>
      </div>
      <div class="panel">
        <h3 class="panel-title">案件別PL</h3>
        <div class="table-wrap"><table id="projectPlTable"></table></div>
      </div>
    </section>

    <section id="billing" class="view">
      <div class="page-head">
        <div>
          <h2>請求書の転記元</h2>
          <p class="lead">売上明細と、クライアントへ請求する外注立替をまとめて確認します。</p>
        </div>
      </div>
      <div class="cards" id="billingCards"></div>
      <div class="panel">
        <h3 class="panel-title">請求対象を絞り込み</h3>
        <div class="filters">
          <label>請求月<input type="month" id="invoiceMonth"></label>
          <label>クライアント<select id="invoiceClient"></select></label>
          <label>状況<select id="invoiceStatus"><option value="">すべて</option><option>未請求</option><option>請求書作成済</option><option>請求済</option><option>入金済</option></select></label>
        </div>
      </div>
      <div class="table-wrap"><table id="invoiceTable"></table></div>
    </section>

    <section id="setup" class="view">
      <div class="page-head">
        <div>
          <h2>初期設定</h2>
          <p class="lead">最初にここでクライアント、案件、担当者、外注先を登録します。</p>
        </div>
      </div>
      <div class="panel">
        <h3 class="panel-title">基本マスタを追加</h3>
        <div class="form-grid">
          <form id="clientForm" class="span-2">
            <label>クライアント名<input name="name" required></label>
            <button class="primary" type="submit">追加</button>
          </form>
          <form id="ownerForm" class="span-2">
            <label>担当者名<input name="name" required></label>
            <button class="primary" type="submit">追加</button>
          </form>
          <form id="vendorForm" class="span-2">
            <label>外注先名<input name="name" required></label>
            <button class="primary" type="submit">追加</button>
          </form>
        </div>
      </div>
      <div class="panel">
        <h3 class="panel-title">案件を追加</h3>
        <form id="projectForm" class="form-grid">
          <label class="span-2">案件名<input name="name" required></label>
          <label>クライアント<select name="clientId" required></select></label>
          <label>担当者<select name="ownerId" required></select></label>
          <label>領域<select name="domain" required><option>制作</option><option>広告</option><option>開発</option><option>コンサル</option><option>共通</option></select></label>
          <button class="primary" type="submit">案件を追加</button>
        </form>
      </div>
      <div class="panel">
        <h3 class="panel-title">登録済みマスタ</h3>
        <div class="pill-row" id="masterPills"></div>
        <div class="table-wrap"><table id="projectTable"></table></div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "division-pl-prototype-v2";
    const initialState = {
      clients: [],
      owners: [],
      vendors: [],
      projects: [],
      outsourcing: [],
      revenues: []
    };
    let state = loadState();

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || structuredClone(initialState);
      } catch {
        return structuredClone(initialState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
    }

    function uid(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function yen(value) {
      return Number(value || 0).toLocaleString("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 });
    }

    function nameOf(collection, id) {
      return (state[collection].find((item) => item.id === id) || {}).name || "";
    }

    function statusClass(value) {
      if (["受領済", "支払済", "入金済", "請求済"].includes(value)) return "ok";
      if (["支払予定", "請求書作成済"].includes(value)) return "warn";
      return "bad";
    }

    function optionRows(rows, placeholder) {
      return `<option value="">${placeholder}</option>` + rows.map((row) => `<option value="${row.id}">${row.name}</option>`).join("");
    }

    function renderSelects() {
      document.querySelectorAll('select[name="clientId"], #invoiceClient').forEach((select) => {
        const current = select.value;
        select.innerHTML = optionRows(state.clients, "選択");
        select.value = current;
      });
      document.querySelectorAll('select[name="ownerId"], #productionOwner').forEach((select) => {
        const current = select.value;
        select.innerHTML = optionRows(state.owners, "すべて");
        select.value = current;
      });
      document.querySelectorAll('select[name="vendorId"]').forEach((select) => {
        const current = select.value;
        select.innerHTML = optionRows(state.vendors, "選択");
        select.value = current;
      });
      document.querySelectorAll('select[name="projectId"]').forEach((select) => {
        const current = select.value;
        select.innerHTML = optionRows(state.projects, "選択");
        select.value = current;
      });
    }

    function cardHtml(items) {
      return items.map(([label, value]) => `<div class="card"><span>${label}</span><strong>${value}</strong></div>`).join("");
    }

    function table(id, headers, rows) {
      const target = document.getElementById(id);
      if (!rows.length) {
        target.innerHTML = `<tbody><tr><td class="empty">まだデータがありません。サンプル投入か登録から始めてください。</td></tr></tbody>`;
        return;
      }
      const head = headers.map((h) => `<th class="${h.money ? "money" : ""}">${h.label}</th>`).join("");
      const body = rows.map((row) => `<tr>${headers.map((h) => `<td class="${h.money ? "money" : ""}">${h.render ? h.render(row) : row[h.key]}</td>`).join("")}</tr>`).join("");
      target.innerHTML = `<thead><tr>${head}</tr></thead><tbody>${body}</tbody>`;
    }

    function rowsByProject() {
      const map = new Map();
      function ensure(projectId) {
        if (!map.has(projectId)) map.set(projectId, { projectId, revenue: 0, cost: 0 });
        return map.get(projectId);
      }
      state.revenues.forEach((row) => ensure(row.projectId).revenue += row.amount);
      state.outsourcing.forEach((row) => ensure(row.projectId).cost += row.amount);
      return [...map.values()].map((row) => ({
        ...row,
        gross: row.revenue - row.cost,
        rate: row.revenue ? (row.revenue - row.cost) / row.revenue : 0
      }));
    }

    function rowsByMonth() {
      const months = [...new Set([...state.revenues.map((r) => r.period), ...state.outsourcing.map((r) => r.period)])].sort();
      return months.map((period) => {
        const revenue = state.revenues.filter((r) => r.period === period).reduce((sum, r) => sum + r.amount, 0);
        const cost = state.outsourcing.filter((r) => r.period === period).reduce((sum, r) => sum + r.amount, 0);
        return { period, revenue, cost, gross: revenue - cost, rate: revenue ? (revenue - cost) / revenue : 0 };
      });
    }

    function invoiceRows() {
      const sales = state.revenues.map((row) => ({
        source: "売上",
        period: row.period,
        clientId: row.clientId,
        projectId: row.projectId,
        itemName: row.itemName,
        quantity: 1,
        unitPrice: row.amount,
        amount: row.amount,
        invoiceStatus: row.invoiceStatus
      }));
      const costs = state.outsourcing.filter((row) => row.billable === "請求対象").map((row) => ({
        source: "外注立替",
        period: row.period,
        clientId: row.clientId,
        projectId: row.projectId,
        itemName: row.description,
        quantity: row.quantity,
        unitPrice: row.unitPrice,
        amount: row.amount,
        invoiceStatus: "未請求"
      }));
      return [...sales, ...costs];
    }

    function renderProduction() {
      const month = document.getElementById("productionMonth").value;
      const owner = document.getElementById("productionOwner").value;
      const focus = document.getElementById("productionFocus").value;
      const needs = state.outsourcing.filter((row) => row.vendorInvoiceStatus === "未受領" || row.paymentStatus !== "支払済");
      const billable = state.outsourcing.filter((row) => row.billable === "請求対象");
      const total = state.outsourcing.reduce((sum, row) => sum + row.amount, 0);
      document.getElementById("productionCards").innerHTML = cardHtml([
        ["外注登録", `${state.outsourcing.length}件`],
        ["確認が必要", `${needs.length}件`],
        ["請求対象", `${billable.length}件`],
        ["外注費合計", yen(total)]
      ]);

      let rows = state.outsourcing.filter((row) => (!month || row.period === month) && (!owner || row.ownerId === owner));
      if (focus === "needs") rows = rows.filter((row) => row.vendorInvoiceStatus === "未受領" || row.paymentStatus !== "支払済");
      if (focus === "billable") rows = rows.filter((row) => row.billable === "請求対象");
      table("productionTable", [
        { label: "月", key: "period" },
        { label: "クライアント", render: (r) => nameOf("clients", r.clientId) },
        { label: "案件", render: (r) => nameOf("projects", r.projectId) },
        { label: "担当", render: (r) => nameOf("owners", r.ownerId) },
        { label: "外注先", render: (r) => nameOf("vendors", r.vendorId) },
        { label: "依頼内容", key: "description" },
        { label: "金額", money: true, render: (r) => yen(r.amount) },
        { label: "請求書", render: (r) => `<span class="badge ${statusClass(r.vendorInvoiceStatus)}">${r.vendorInvoiceStatus}</span>` },
        { label: "支払", render: (r) => `<span class="badge ${statusClass(r.paymentStatus)}">${r.paymentStatus}</span>` },
        { label: "請求対象", key: "billable" }
      ], rows);
    }

    function renderManager() {
      const revenue = state.revenues.reduce((sum, row) => sum + row.amount, 0);
      const cost = state.outsourcing.reduce((sum, row) => sum + row.amount, 0);
      const gross = revenue - cost;
      const unbilled = state.revenues.filter((row) => row.invoiceStatus === "未請求").reduce((sum, row) => sum + row.amount, 0);
      document.getElementById("managerCards").innerHTML = cardHtml([
        ["売上", yen(revenue)],
        ["外注費", yen(cost)],
        ["粗利", yen(gross)],
        ["未請求売上", yen(unbilled)]
      ]);
      const plHeaders = [
        { label: "対象", render: (r) => r.period || nameOf("projects", r.projectId) },
        { label: "売上", money: true, render: (r) => yen(r.revenue) },
        { label: "外注費", money: true, render: (r) => yen(r.cost) },
        { label: "粗利", money: true, render: (r) => yen(r.gross) },
        { label: "粗利率", money: true, render: (r) => `${(r.rate * 100).toFixed(1)}%` }
      ];
      table("monthlyPlTable", plHeaders, rowsByMonth());
      table("projectPlTable", plHeaders, rowsByProject().sort((a, b) => b.gross - a.gross));
    }

    function renderBilling() {
      const month = document.getElementById("invoiceMonth").value;
      const client = document.getElementById("invoiceClient").value;
      const status = document.getElementById("invoiceStatus").value;
      const all = invoiceRows();
      const rows = all.filter((row) => (!month || row.period === month) && (!client || row.clientId === client) && (!status || row.invoiceStatus === status));
      const total = rows.reduce((sum, row) => sum + row.amount, 0);
      const unbilled = all.filter((row) => row.invoiceStatus === "未請求").reduce((sum, row) => sum + row.amount, 0);
      document.getElementById("billingCards").innerHTML = cardHtml([
        ["表示中の請求額", yen(total)],
        ["未請求", yen(unbilled)],
        ["明細数", `${rows.length}件`],
        ["請求先数", `${new Set(rows.map((r) => r.clientId)).size}社`]
      ]);
      table("invoiceTable", [
        { label: "月", key: "period" },
        { label: "種別", key: "source" },
        { label: "クライアント", render: (r) => nameOf("clients", r.clientId) },
        { label: "案件", render: (r) => nameOf("projects", r.projectId) },
        { label: "請求項目", key: "itemName" },
        { label: "数量", key: "quantity" },
        { label: "単価", money: true, render: (r) => yen(r.unitPrice) },
        { label: "金額", money: true, render: (r) => yen(r.amount) },
        { label: "状況", render: (r) => `<span class="badge ${statusClass(r.invoiceStatus)}">${r.invoiceStatus}</span>` }
      ], rows);
    }

    function renderSetup() {
      document.getElementById("masterPills").innerHTML = [
        `クライアント ${state.clients.length}件`,
        `案件 ${state.projects.length}件`,
        `担当者 ${state.owners.length}件`,
        `外注先 ${state.vendors.length}件`
      ].map((text) => `<span class="pill">${text}</span>`).join("");
      table("projectTable", [
        { label: "案件", key: "name" },
        { label: "クライアント", render: (r) => nameOf("clients", r.clientId) },
        { label: "担当者", render: (r) => nameOf("owners", r.ownerId) },
        { label: "領域", key: "domain" }
      ], state.projects);
    }

    function render() {
      renderSelects();
      renderProduction();
      renderManager();
      renderBilling();
      renderSetup();
    }

    function switchView(viewId) {
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.view === viewId));
      document.querySelectorAll(".view").forEach((view) => view.classList.toggle("active", view.id === viewId));
    }

    document.querySelector(".tabs").addEventListener("click", (event) => {
      const button = event.target.closest("[data-view]");
      if (button) switchView(button.dataset.view);
    });

    document.addEventListener("click", (event) => {
      const jump = event.target.closest("[data-view-jump]");
      if (jump) switchView(jump.dataset.viewJump);
    });

    function handleForm(id, onSubmit) {
      document.getElementById(id).addEventListener("submit", (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const data = Object.fromEntries(new FormData(form).entries());
        onSubmit(data);
        form.reset();
        saveState();
      });
    }

    handleForm("clientForm", (data) => state.clients.push({ id: uid("CLI"), name: data.name }));
    handleForm("ownerForm", (data) => state.owners.push({ id: uid("OWN"), name: data.name }));
    handleForm("vendorForm", (data) => state.vendors.push({ id: uid("VEN"), name: data.name }));
    handleForm("projectForm", (data) => state.projects.push({ id: uid("PRJ"), ...data }));
    handleForm("outsourcingForm", (data) => {
      const quantity = Number(data.quantity);
      const unitPrice = Number(data.unitPrice);
      const project = state.projects.find((item) => item.id === data.projectId);
      state.outsourcing.push({
        id: uid("OUT"),
        ...data,
        clientId: data.clientId || (project ? project.clientId : ""),
        ownerId: data.ownerId || (project ? project.ownerId : ""),
        quantity,
        unitPrice,
        amount: Math.round(quantity * unitPrice)
      });
    });
    handleForm("revenueForm", (data) => {
      state.revenues.push({ id: uid("REV"), ...data, amount: Number(data.amount) });
    });

    ["productionMonth", "productionOwner", "productionFocus", "invoiceMonth", "invoiceClient", "invoiceStatus"].forEach((id) => {
      document.getElementById(id).addEventListener("input", render);
    });

    document.getElementById("seedBtn").addEventListener("click", () => {
      const c1 = { id: uid("CLI"), name: "青葉商事" };
      const c2 = { id: uid("CLI"), name: "North Peak" };
      const o1 = { id: uid("OWN"), name: "佐藤" };
      const o2 = { id: uid("OWN"), name: "田中" };
      const v1 = { id: uid("VEN"), name: "山田デザイン" };
      const v2 = { id: uid("VEN"), name: "CraftLab" };
      const p1 = { id: uid("PRJ"), name: "ECサイト改善", clientId: c1.id, ownerId: o1.id, domain: "制作" };
      const p2 = { id: uid("PRJ"), name: "広告LP制作", clientId: c2.id, ownerId: o2.id, domain: "広告" };
      state = {
        clients: [c1, c2],
        owners: [o1, o2],
        vendors: [v1, v2],
        projects: [p1, p2],
        outsourcing: [
          { id: uid("OUT"), period: "2026-05", clientId: c1.id, projectId: p1.id, ownerId: o1.id, vendorId: v1.id, description: "商品ページデザイン", quantity: 8, unitPrice: 35000, amount: 280000, vendorInvoiceStatus: "受領済", paymentStatus: "支払予定", billable: "請求対象" },
          { id: uid("OUT"), period: "2026-05", clientId: c2.id, projectId: p2.id, ownerId: o2.id, vendorId: v2.id, description: "LPコーディング", quantity: 1, unitPrice: 180000, amount: 180000, vendorInvoiceStatus: "未受領", paymentStatus: "未払", billable: "請求対象" }
        ],
        revenues: [
          { id: uid("REV"), period: "2026-05", clientId: c1.id, projectId: p1.id, ownerId: o1.id, type: "スポット", amount: 750000, invoiceStatus: "請求済", itemName: "ECサイト改善支援" },
          { id: uid("REV"), period: "2026-05", clientId: c2.id, projectId: p2.id, ownerId: o2.id, type: "スポット", amount: 520000, invoiceStatus: "未請求", itemName: "広告LP制作費" }
        ]
      };
      saveState();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      if (!confirm("保存データを初期化しますか？")) return;
      state = structuredClone(initialState);
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("jsonBtn").addEventListener("click", () => {
      download(`division-pl-backup-${new Date().toISOString().slice(0, 10)}.json`, JSON.stringify(state, null, 2), "application/json");
    });

    document.getElementById("csvBtn").addEventListener("click", () => {
      const rows = invoiceRows().map((row) => ({
        period: row.period,
        client: nameOf("clients", row.clientId),
        project: nameOf("projects", row.projectId),
        source: row.source,
        itemName: row.itemName,
        quantity: row.quantity,
        unitPrice: row.unitPrice,
        amount: row.amount,
        invoiceStatus: row.invoiceStatus
      }));
      const headers = Object.keys(rows[0] || { period: "", client: "", project: "", source: "", itemName: "", quantity: "", unitPrice: "", amount: "", invoiceStatus: "" });
      const csv = [headers.join(","), ...rows.map((row) => headers.map((h) => `"${String(row[h] || "").replaceAll('"', '""')}"`).join(","))].join("\n");
      download(`invoice-lines-${new Date().toISOString().slice(0, 10)}.csv`, "\ufeff" + csv, "text/csv;charset=utf-8");
    });

    render();
  </script>
</body>
</html>
